<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workplace.io - Component Catalog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 40px 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #86868b;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat {
      background: #fff;
      border-radius: 12px;
      padding: 16px 24px;
      min-width: 140px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 12px;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .search-bar {
      margin-bottom: 24px;
    }

    .search-bar input {
      width: 100%;
      max-width: 400px;
      padding: 10px 16px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: #0071e3;
    }

    .group {
      margin-bottom: 32px;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      cursor: pointer;
      user-select: none;
    }

    .group-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .group-count {
      background: #e8e8ed;
      color: #6e6e73;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .group-toggle {
      font-size: 12px;
      color: #86868b;
      transition: transform 0.2s;
    }

    .group.collapsed .group-toggle {
      transform: rotate(-90deg);
    }

    .group.collapsed .group-items {
      display: none;
    }

    .group-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .component-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-radius: 8px;
      padding: 10px 16px;
      transition: box-shadow 0.15s;
    }

    .component-row:hover {
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .component-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .component-name {
      font-size: 14px;
      font-weight: 500;
    }

    .component-path {
      font-size: 12px;
      color: #86868b;
      font-family: "SF Mono", Menlo, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-btn {
      background: #f5f5f7;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      color: #1d1d1f;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .copy-btn:hover {
      background: #e8e8ed;
    }

    .copy-btn.copied {
      background: #30d158;
      border-color: #30d158;
      color: #fff;
    }

    .hidden { display: none !important; }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #86868b;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="stats">
    <div class="stat">

      <div class="stat-label">Total Components</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="group-count">0</div>
      <div class="stat-label">Groups</div>
    </div>
  </div>

    <input type="text" id="search" placeholder="Filter components..." autocomplete="off">

// ── Derive groups from file path ──
function getGroup(c) {
  const parts = c.path.replace("app/views/", "").split("/");
  if (parts.includes("components"))  return parts.slice(0, parts.indexOf("components")).join("/");
  if (parts.includes("widgets"))     return parts.slice(0, parts.indexOf("widgets")).join("/") + "/widgets";
  if (parts.includes("widget_js"))   return parts.slice(0, parts.indexOf("widget_js")).join("/") + "/widget_js";
  if (parts.includes("modals"))      return parts.slice(0, parts.indexOf("modals")).join("/") + "/modals";
  if (parts.includes("shared"))      return parts.slice(0, parts.indexOf("shared") + 1).join("/");
  return parts.slice(0, -1).join("/");
}

const GROUP_LABELS = {
  "admin":                 "Admin Dashboard",
  "admin/models":          "Admin Models",
  "dashboard":             "Dashboard",
  "model_tests":           "Model Tests",
  "onboarding":            "Onboarding",
  "ai_chat/widgets":       "AI Chat Widgets",
  "ai_chat":               "AI Chat",
  "ai_chat/widget_js":     "AI Chat Widget JS",
  "layouts/modals":        "Layout Modals",
  "layouts":               "Layouts",
  "settings":              "Settings",
  "shared":                "Shared",
  "devise/shared":         "Devise (Auth)",
};

function buildCatalog(filter = "") {
  const catalog = document.getElementById("catalog");
  const noResults = document.getElementById("no-results");
  catalog.innerHTML = "";

  const lowerFilter = filter.toLowerCase();
  const filtered = COMPONENTS.filter(c =>
    !lowerFilter ||
    c.name.toLowerCase().includes(lowerFilter) ||
    c.render.toLowerCase().includes(lowerFilter) ||
    c.path.toLowerCase().includes(lowerFilter)
  );

  // Group components
  const groups = new Map();
  filtered.forEach(c => {
    const key = getGroup(c);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(c);
  });

  if (groups.size === 0) {
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  document.getElementById("total-count").textContent = COMPONENTS.length;
  document.getElementById("group-count").textContent = new Set(COMPONENTS.map(getGroup)).size;

  groups.forEach((items, key) => {
    const label = GROUP_LABELS[key] || key;

    const group = document.createElement("div");
    group.className = "group";

    const header = document.createElement("div");
    header.className = "group-header";
    header.innerHTML = `<span class="group-toggle">&#9660;</span><h2>${label}</h2><span class="group-count">${items.length}</span>`;
    header.addEventListener("click", () => group.classList.toggle("collapsed"));

    const list = document.createElement("div");
    list.className = "group-items";

    items.forEach(c => {
      const row = document.createElement("div");
      row.className = "component-row";

      const renderCall = `<%= render '${c.render}' %>`;

      row.innerHTML = `
        <div class="component-info">
          <span class="component-name">${c.name}</span>
          <span class="component-path">${c.path}</span>
        </div>
        <button class="copy-btn" data-copy="${renderCall.replace(/"/g, '&quot;')}">Copy component</button>
      `;
      list.appendChild(row);
    });

    group.appendChild(header);
    group.appendChild(list);
    catalog.appendChild(group);
  });

  // Attach copy handlers
  catalog.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      navigator.clipboard.writeText(btn.dataset.copy).then(() => {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy component";
          btn.classList.remove("copied");
        }, 1500);
      });
    });
  });
}

document.getElementById("search").addEventListener("input", e => buildCatalog(e.target.value));

buildCatalog();
